<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />

    <title>Virginia | Typemaster pre-launch landing page</title>
  </head>
  <body class="bg-amber-50">
    <!--hidden header for accesibility reasons(screen readers)  -->
    <header aria-labelledby="typemaster-page">
      <h1 id="typemaster-page" class="hidden">
        Typemaster pre-launch landing page
      </h1>
    </header>
    <nav
      class="bg-blue-200 mt-6 mr-6 ml-6 mb-16 flex items-center justify-between md:mt-10 md:mr-10 md:ml-10 md:mb-15.5 xl:mt-13.75 xl:mr-41.25 xl:ml-41.25 xl:mb-20.75"
    >
      <a href="#" aria-label="Typemaster pre-launch landing-page">
        <img src="assets/shared/logo.svg" alt="" />
      </a>

      <!-- BUTTON -->
      <a
        href="#"
        aria-label="Pre-order now"
        class="group focus:outline focus-within:outline-offset-4 focus:outline-[var(--color-dark-orange)]"
      >
        <div
          class="bg-[var(--color-light-grey)] rounded-lg flex items-center justify-center w-[9.375rem] h-12 md:w-[10.9375rem] md:h-[3.625rem] hover:bg-[var(--color-dark-grey)] duration-100 active:bg-[#162542a2] btn-shadow-grey"
        >
          <p
            class="uppercase font-(family-name:--font-barlow) font-bold text-base leading-[1.625] text-(--color-dark-grey) group-hover:text-white group-active:text-white"
          >
            pre-order now
          </p>
        </div>
      </a>
    </nav>

    <!-- TYPEMASTER KEYBOARD SECTION -->
    <section
      class="bg-amber-400 flex flex-col gap-16 md:flex-row md:gap-[4.3125rem] xl:ml-41.25 xl:mr-41.25 2xl:gap-31.25"
    >
      <!-- Texts and button container-->
      <div
        class="bg-blue-200 ml-6 mr-6 flex flex-col gap-8 md:ml-10 md:mr-0 md:gap-8.5 md:pt-15.5 md:pb-15.5 xl:ml-0 2xl:gap-10 2xl:pt-21.75 2xl:pb-21.75 2xl:pr-15"
      >
        <h1
          class="uppercase font-(family-name:--font-barlow) font-black text-5xl text-(--color-dark-grey) md:pr-11 2xl:text-[3.5rem]"
        >
          Typemaster Keyboard
        </h1>
        <p
          class="font-(family-name:--font-barlow) font-medium text-base leading-[1.625] text-(--color-middle-grey) 2xl:text-lg 2xl:leading-[1.44]"
        >
          Improve your productivity and gaming without breaking the bank.
          Upgrade to a high quality mechanical typing experience.
        </p>

        <!-- button - realease container -->
        <div class="bg-red-200 flex gap-8 items-center md:gap-9">
          <!-- BUTTON -->
          <a
            href="#"
            aria-label="Pre-order now"
            class="group focus:outline focus-within:outline-offset-4 focus:outline-[var(--color-dark-orange)]"
          >
            <div
              class="bg-[var(--color-dark-orange)] w-[9.375rem] h-12 rounded-lg flex items-center justify-center md:w-[10.9375rem] md:h-[3.625rem] hover:bg-[var(--color-light-orange)] duration-300 active:bg-[#ff9c629d] btn-shadow-orange"
            >
              <p
                class="uppercase font-(family-name:--font-barlow) font-bold text-base leading-[1.625] text-(--color-white)"
              >
                pre-order now
              </p>
            </div>
          </a>
          <div>
            <p
              class="uppercase font-(family-name:--font-barlow) font-bold text-base leading-[1.625] text-(--color-middle-grey)"
            >
              Release on 5/27
            </p>
          </div>
        </div>
      </div>

      <div class="bg-red-400">
        <!-- mobile img -->
        <img
          class="ml-6 rounded-3xl md:hidden"
          src="assets/mobile/image-keyboard.jpg"
          alt=""
        />

        <!-- tablet image -->
        <img
          class="hidden md:block md:rounded-l-3xl md:w-auto md:h-full md:object-cover md:object-left-top xl:hidden"
          src="assets/tablet/image-keyboard.jpg"
          alt=""
        />

        <!-- container with desktop image and grey container on the right -->
        <div class="xl:relative xl:h-full xl:w-auto">
          <!-- desktop image -->
          <img
            class="hidden xl:block xl:rounded-3xl xl:w-auto xl:h-full xl:object-cover xl:object-left-top"
            src="assets/desktop/image-keyboard.jpg"
            alt=""
          />

          <!-- grey empty container -->
          <div
            class="hidden xl:block xl:w-63.75 xl:h-60 xl:bg-(--color-light-grey) xl:rounded-3xl xl:absolute xl:z-30 xl:top-0 xl:-right-71.25"
          ></div>
        </div>
      </div>
    </section>

    <!-- Mechanical wireless keyboard The
    Typemaster keyboard boasts top-notch build and practical design. It offers a
    wide variety of switches and keycaps, along with reliable wireless
    connectivity. Highly compatible Easy to use and works well with all major
    computer brands, gaming consoles and mobile devices. Plug & play, no
    installation or driver needed. Wireless with bluetooth Powerful 2.4G RF
    technology allows you to connect the cordless keyboard from up to 30ft away.
    Simply plug the unifying receiver into your computer. High capacity battery
    Equipped with a long-lasting built-in battery, you’ll never have to spend a
    dime on replaceable ones.  Enjoy 40 hours of usage time between charges. RGB
    backlit modes Choose from 4 backlight brightness levels and adjustable
    breathing speed. Each key glows intensely in the dark and helps you type in
    low light conditions. Typemaster 2021 | All Rights Reserved -->
  </body>
</html>
